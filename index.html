<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel File Processor - Path Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            min-height: 90vh;
        }

        /* ==================== LEFT SECTION ==================== */
        .left-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .branch-display {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            border-left: 5px solid #3498db;
        }

        .branch-display h2 {
            color: #2c3e50;
            font-size: 16px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .branch-name {
            font-size: 42px;
            font-weight: 700;
            color: #3498db;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.05);
        }

        .branch-code {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 5px;
        }

        .dropzone {
            flex: 1;
            background: white;
            border: 3px dashed #bdc3c7;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .dropzone:hover {
            border-color: #3498db;
            background-color: #f8fafb;
            transform: translateY(-2px);
        }

        .dropzone.dragover {
            background-color: #ebf5fb;
            border-color: #3498db;
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.2);
        }

        .dropzone-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.7;
        }

        .dropzone-text {
            text-align: center;
        }

        .dropzone-text h3 {
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 18px;
        }

        .dropzone-text p {
            color: #95a5a6;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .file-input {
            display: none;
        }

        .browse-btn {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .browse-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .status-message {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            border-left: 5px solid #2ecc71;
        }

        .status-message.error {
            border-left-color: #e74c3c;
            background-color: #fadbd8;
            color: #c0392b;
        }

        .status-message.success {
            border-left-color: #2ecc71;
            background-color: #d5f4e6;
            color: #27ae60;
        }

        .status-message.loading {
            border-left-color: #f39c12;
            background-color: #fef5e7;
            color: #d68910;
        }

        .status-icon {
            font-size: 18px;
        }

        /* ==================== RIGHT SECTION ==================== */
        .right-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            max-height: 90vh;
        }

        .right-section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }

        .branch-paths {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .branch-group {
            background: #f8fafb;
            border-radius: 8px;
            padding: 18px;
            border-left: 5px solid #3498db;
        }

        .branch-group h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: 600;
        }

        .path-input-group {
            margin-bottom: 12px;
        }

        .path-input-group:last-child {
            margin-bottom: 0;
        }

        .path-label {
            display: block;
            color: #34495e;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .path-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            background-color: white;
        }

        .path-input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
            background-color: #f8fafb;
        }

        .save-btn {
            width: 100%;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }

        .save-btn:active {
            transform: translateY(0);
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .right-section {
                max-height: none;
            }
        }

        /* ==================== SCROLLBAR ==================== */
        .right-section::-webkit-scrollbar {
            width: 8px;
        }

        .right-section::-webkit-scrollbar-track {
            background: #ecf0f1;
            border-radius: 10px;
        }

        .right-section::-webkit-scrollbar-thumb {
            background: #bdc3c7;
            border-radius: 10px;
        }

        .right-section::-webkit-scrollbar-thumb:hover {
            background: #95a5a6;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ==================== LEFT SECTION ==================== -->
        <div class="left-section">
            <div class="branch-display">
                <h2>ตรวจพบสาขา</h2>
                <div class="branch-name" id="branchName">-</div>
                <div class="branch-code" id="branchCode">ยังไม่มีการเลือกไฟล์</div>
            </div>

            <div class="dropzone" id="dropzone">
                <div class="dropzone-icon">📊</div>
                <div class="dropzone-text">
                    <h3>ลากไฟล์ Excel มาปล่อยที่นี่</h3>
                    <p>หรือ</p>
                    <button class="browse-btn" id="browseBtn">เลือกไฟล์</button>
                </div>
                <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xls">
            </div>

            <div class="status-message" id="statusMessage">
                <span class="status-icon" id="statusIcon">⏳</span>
                <span id="statusText">กำลังประมวลผล...</span>
            </div>
        </div>

        <!-- ==================== RIGHT SECTION ==================== -->
        <div class="right-section">
            <h2>⚙️ ตั้งค่า Path ปลายทาง</h2>
            <div class="branch-paths" id="branchPaths"></div>
            <button class="save-btn" id="saveBtn">💾 บันทึกการตั้งค่า</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
